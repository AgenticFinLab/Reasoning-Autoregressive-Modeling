# =============================================================================
# NLCP V3 ConceptPyramidBuilder Test Configuration
# =============================================================================
# Purpose: Configuration for test_concept_builder.py unit tests
# Usage:
#   # Mock mode (fast, no model download):
#   python examples/nlcpV3/utest/test_concept_builder.py
#
#   # Real model mode (loads Qwen from HuggingFace):
#   python examples/nlcpV3/utest/test_concept_builder.py -c configs/nlcpV3/utest/test_concept_builder.yml
#
#   # With GSM8K integration test:
#   python examples/nlcpV3/utest/test_concept_builder.py -c configs/nlcpV3/utest/test_concept_builder.yml --test gsm8k
# =============================================================================

# Data configuration for GSM8K integration tests
data:
  data_name: "GSM8K"
  data_path: "EXPERIMENT/data/GSM8K"
  split: "train"
  subset: ""

# Environment configuration
environment:
  dotenv_path: ".env"
  seed: 42
  dataloader_num_workers: 0
  device_map:
    model:
      device: "auto"
      priority: 1

# Model configuration - ConceptPyramidBuilder specific
model:
  # Encoder configuration (Qwen decoder-only Transformer for CoT encoding)
  encoder:
    encoder_model_name: "Qwen/Qwen2.5-0.5B"
    # Number of encoder layers to use.
    #   -1: use ALL layers (no pruning, default)
    #   N>0: keep only first N layers
    encoder_num_layers: -1
    encoder_freeze: false

  # Concept pyramid configuration
  pyramid:
    hidden_dim: 256
    num_heads: 8
    num_levels: 6
    level_lengths: [1, 2, 4, 8, 16, 32]
    max_seq_len: 512

  # Decoder configuration (for future recon_decoder / lm_head)
  decoder:
    vocab_size: 151936
    dropout: 0.1
    rms_norm_eps: 1.0e-6
    muP_scale: 1.0

  # Builder-specific parameters
  builder:
    # Query initialization mode (ablation option)
    # True: initialize queries with positional priors (DLCM-style segment bias)
    # False: random Xavier uniform initialization
    use_positional_query_init: true

# Training configuration (minimal for testing)
training:
  batch_size: 4
  num_epochs: 1
  learning_rate: 1.0e-4
  weight_decay: 0.01

  # Loss weights for training objectives
  loss_weights:
    ntp_loss_weight: 1.0
    concept_loss_weight: 0.1
    recon_loss_weight: 0.1

# Log configuration
log:
  save_folder: "EXPERIMENT/nlcpV3/utest/concept_builder"
  checkpoint_path: "EXPERIMENT/nlcpV3/utest/concept_builder/checkpoints"
  log_path: "EXPERIMENT/nlcpV3/utest/concept_builder/logs"
  log_level: "INFO"

# Evaluation configuration (disabled for testing)
evaluation:
  enabled: false
