# =============================================================================
# NLCP V3 ConceptPyramidBuilder Test Configuration
# =============================================================================
# Purpose: Configuration for test_concept_builder.py unit tests
# Usage:
#   # Mock mode (fast, no model download):
#   python examples/nlcpV3/utest/test_concept_builder.py
#
#   # Real model mode (loads Qwen from HuggingFace):
#   python examples/nlcpV3/utest/test_concept_builder.py -c configs/nlcpV3/utest/test_concept_builder.yml
#
#   # With GSM8K integration test:
#   python examples/nlcpV3/utest/test_concept_builder.py -c configs/nlcpV3/utest/test_concept_builder.yml --test gsm8k
# =============================================================================

# Data configuration for GSM8K integration tests
data:
  data_name: "GSM8K"
  data_path: "EXPERIMENT/data/GSM8K"
  split: "train"
  subset: ""

# Environment configuration
environment:
  dotenv_path: ".env"
  seed: 42
  dataloader_num_workers: 0
  device_map:
    model:
      device: "auto"
      priority: 1

# Model configuration - ConceptPyramidBuilder specific
model:
  # Reason model configuration (Qwen decoder-only Transformer)
  # This is the SAME model used for both CoT feature extraction and
  # Solution generation. The Builder uses its backbone (AutoModel),
  # the Predictor uses its lm_head for autoregressive generation.
  reason_model:
    reason_model_name: "Qwen/Qwen2.5-0.5B"
    # Number of layers to use from the backbone.
    #   -1: use ALL layers (no pruning, default)
    #   N>0: keep only first N layers
    reason_model_num_layers: -1
    reason_model_freeze: false
    # LoRA configuration for reason_model (null = no LoRA)
    # When enabled, applies PEFT LoRA adapters for parameter-efficient fine-tuning.
    # reason_model_lora:
    #   r: 8
    #   lora_alpha: 16
    #   target_modules: ["q_proj", "v_proj"]
    #   lora_dropout: 0.05
    reason_model_lora: null

  # Concept pyramid configuration
  pyramid:
    hidden_dim: 256
    num_heads: 8
    num_levels: 6
    level_lengths: [1, 2, 4, 8, 16, 32]
    max_seq_len: 512

  # Builder-specific parameters
  builder:
    # Query initialization mode (ablation option)
    # True: initialize queries with positional priors (DLCM-style segment bias)
    # False: random Xavier uniform initialization
    use_positional_query_init: true
    # Enable NTP reasoning loss: Q + concept pyramid → solution validation.
    use_reasoning_loss: false

# Training configuration (minimal for testing)
training:
  batch_size: 4
  num_epochs: 1
  learning_rate: 1.0e-4
  weight_decay: 0.01

  # Loss weights for training objectives
  # ─────────────────────────────────────────────────────────
  # ntp_loss_weight:
  #   NTP / reasoning loss. When use_reasoning_loss=True, the Builder
  #   computes cross-entropy on solution tokens given Q + concept pyramid.
  #   [test value: 1.0 — non-zero to verify NTP code path in unit tests]
  #
  # concept_loss_weight:
  #   Intra-level ordering loss. Encourages concepts within each level
  #   to attend to sequential CoT positions (Gaussian soft targets).
  #
  # recon_loss_weight:
  #   CoT reconstruction loss. MSE between pyramid-reconstructed hidden
  #   states and the original projected CoT hidden states.
  # ─────────────────────────────────────────────────────────
  loss_weights:
    ntp_loss_weight: 1.0
    concept_loss_weight: 0.1
    recon_loss_weight: 0.1

# Log configuration
log:
  save_folder: "EXPERIMENT/nlcpV3/utest/concept_builder"
  checkpoint_path: "EXPERIMENT/nlcpV3/utest/concept_builder/checkpoints"
  log_path: "EXPERIMENT/nlcpV3/utest/concept_builder/logs"
  log_level: "INFO"

# Evaluation configuration (disabled for testing)
evaluation:
  enabled: false
