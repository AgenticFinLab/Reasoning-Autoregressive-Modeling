# =============================================================================
# NLCP V3 ConceptPyramidBuilder Test Configuration — NTP Reasoning Loss
# =============================================================================
# Usage:
#   python examples/nlcpV3/utest/test_concept_builder.py  -c configs/nlcpV3/utest/test_concept_builder_ntp.yml
# =============================================================================

# Data configuration for GSM8K integration tests
data:
  data_name: "GSM8K"
  data_path: "EXPERIMENT/data/GSM8K"
  split: "train"
  subset: ""

# Environment configuration
environment:
  dotenv_path: ".env"
  seed: 42
  dataloader_num_workers: 0
  device_map:
    model:
      device: "auto"
      priority: 1

# Model configuration — NTP reasoning loss enabled
model:
  # Reason model configuration (Qwen decoder-only Transformer)
  reason_model:
    reason_model_name: "Qwen/Qwen2.5-0.5B"
    reason_model_num_layers: -1

  # Concept pyramid configuration
  pyramid:
    hidden_dim: 896
    # Must equal encoder hidden_size to avoid lossy projection (VAR-faithful)
    num_heads: 8
    num_levels: 6
    level_lengths: [1, 2, 4, 8, 16, 32]
    max_seq_len: 512

  # Builder-specific parameters
  builder:
    use_positional_query_init: true
    positional_init_alpha: 0.5

# Training configuration (minimal for testing)
training:
  batch_size: 4
  num_epochs: 1
  learning_rate: 1.0e-4
  weight_decay: 0.01
  reason_model:
    freeze: true
    lora: null

  # Loss weights for training objectives
  loss_weights:
    reasoning_loss_weight: 1.0
    ordering_loss_weight: 0.1
    recon_loss_weight: 0.1
    ordering_margin: 1.0
    residual_loss_weight: 0.01
  ordering_loss_type: margin

# Log configuration
log:
  save_folder: "EXPERIMENT/nlcpV3/utest/concept_builder_ntp"
  checkpoint_path: "EXPERIMENT/nlcpV3/utest/concept_builder_ntp/checkpoints"
  log_path: "EXPERIMENT/nlcpV3/utest/concept_builder_ntp/logs"
  log_level: "INFO"

# Evaluation configuration (disabled for testing)
evaluation:
  enabled: false
