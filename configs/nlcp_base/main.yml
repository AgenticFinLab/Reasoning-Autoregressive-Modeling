# =============================================================================
# NLCP Experiment Configuration (Main)
# =============================================================================
# Purpose:
#   Main orchestration file for NLCP experiments.
#   Defines data, environment, and experiment flow.
#
# Reference:
#   - concept-pyramid.md Section 6 - Experiment Design
#   - concept-pyramid.md Section 7 - Risk Mitigation
#
# Structure:
#   - experiment: Experiment metadata and tracking
#   - environment: Hardware and runtime configuration
#   - data: Dataset configuration
#   - model: Path to model.yml (relative to this file)
#   - training: Path to training.yml (relative to this file)
# =============================================================================

# =============================================================================
# Experiment Metadata
# =============================================================================
experiment:
  name: "nlcp_base_experiment"
  description: "NLCP base experiment with recommended components from critic.md"
  version: "1.0.0"
  
  # Tags for experiment organization and filtering
  tags:
    - "nlcp"
    - "hierarchical_reasoning"
    - "dynamic_expansion"
    - "gumbel_softmax"           # Based on component selection
    - "causal_depth_gate"
    - "relaxed_attention"
    - "directional_consistency"
  
  # Notes for experiment documentation
  notes: |
    This experiment uses the NLCP architecture with all recommended
    improvements from concept-pyramid-critic.md:
    
    1. Gumbel-Softmax Expansion Predictor (Solution 1A)
    2. Causal Depth Gate (Solution 3B)
    3. Relaxed Cross-Level Attention (Solution 4A)
    4. Directional Consistency Loss (Solution 2A)

# =============================================================================
# Environment Configuration
# =============================================================================
environment:
  # Device configuration
  device_map: "auto"            # "auto", "cuda", "cpu", or specific device
  
  # Mixed precision training
  mixed_precision: "bf16"       # "fp16", "bf16", or "no"
  
  # Distributed training
  distributed:
    enabled: false              # Enable for multi-GPU training
    backend: "nccl"             # "nccl" for GPU, "gloo" for CPU
    world_size: 1               # Total number of processes
    rank: 0                     # Rank of this process
  
  # Memory optimization
  memory:
    gradient_checkpointing: true  # Trade compute for memory
    cpu_offload: false           # Offload optimizer states to CPU

# =============================================================================
# Data Configuration
# =============================================================================
# Reference: concept-pyramid.md Section 6 - Experiment Design
# =============================================================================
data:
  # Dataset configuration
  dataset:
    name: "reasoning_dataset"     # Dataset identifier
    path: "data/reasoning"        # Path to dataset
    format: "jsonl"               # "jsonl", "json", "parquet"
    
    # Data splits
    train_split: "train"
    val_split: "validation"
    test_split: "test"
    
    # Data loading
    num_workers: 4                # DataLoader workers
    prefetch_factor: 2            # Batches to prefetch per worker
    pin_memory: true              # Pin memory for faster GPU transfer
  
  # Preprocessing
  preprocessing:
    max_input_length: 512         # Maximum input sequence length
    max_target_length: 512        # Maximum target sequence length
    padding: "max_length"         # Padding strategy
    truncation: true              # Enable truncation

# =============================================================================
# Model Configuration
# =============================================================================
# Path to model.yml (relative to this file)
# =============================================================================
model: "model.yml"

# =============================================================================
# Training Configuration
# =============================================================================
# Path to training.yml (relative to this file)
# =============================================================================
training: "training.yml"

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  # Evaluation metrics
  metrics:
    - "accuracy"
    - "perplexity"
    - "expansion_ratio"          # NLCP-specific: avg L_{k+1}/L_k
    - "depth_distribution"       # NLCP-specific: distribution of depths
    - "consistency_score"        # NLCP-specific: cross-level consistency
  
  # Evaluation frequency
  eval_strategy: "steps"          # "steps", "epochs", "no"
  eval_steps: 1000                # Evaluate every N steps
  
  # Evaluation during training
  eval_on_train: false            # Evaluate on training set
  eval_on_val: true               # Evaluate on validation set

# =============================================================================
# Checkpointing
# =============================================================================
checkpoint:
  # Checkpoint saving
  save_strategy: "steps"          # "steps", "epochs", "best"
  save_steps: 5000                # Save every N steps
  save_total_limit: 3             # Keep only N most recent checkpoints
  
  # Resume training
  resume_from_checkpoint: null    # Path to checkpoint to resume from
  
  # Best model tracking
  metric_for_best_model: "eval_loss"
  greater_is_better: false        # Lower loss is better

# =============================================================================
# Logging
# =============================================================================
logging:
  # Logging framework
  framework: "tensorboard"        # "tensorboard", "wandb", "none"
  
  # TensorBoard specific
  tensorboard:
    log_dir: "runs/nlcp_base"
  
  # Weights & Biases specific (if using wandb)
  wandb:
    project: "nlcp_experiments"
    entity: null                  # Your wandb entity
    tags: ["nlcp", "base"]
  
  # Log level
  log_level: "INFO"
  
  # What to log
  log:
    loss: true
    learning_rate: true
    gradients: true               # Log gradient norms
    parameters: false             # Log parameter statistics
    
    # NLCP-specific logging
    expansion_rates: true         # Log λ_k distributions
    depth_distribution: true      # Log depth K distribution
    consistency_loss: true        # Log L_consist per level

# =============================================================================
# Reproducibility
# =============================================================================
seed: 42                          # Random seed for reproducibility

deterministic:
  cudnn_deterministic: false      # May impact performance
  cudnn_benchmark: true           # Enable for faster training
