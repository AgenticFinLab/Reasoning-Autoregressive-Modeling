# =============================================================================
# NLCP Training Configuration
# =============================================================================
# Purpose:
#   Training hyperparameters for NLCP with three-phase staged pretraining.
#
# Reference:
#   - concept-pyramid.md Section 4 - Pretraining Strategy
#   - concept-pyramid.md Section 4.3 - Staged Pretraining Pipeline
#   - concept-pyramid-critic.md - Component-specific hyperparameters
#
# Three-Phase Training:
#   Phase 1 (25% epochs): Level 0 intent planning
#     - Train: Encoder + Level 0 AR
#     - Freeze: All other modules
#     - Loss: L_NTP at Level 0
#
#   Phase 2 (25% epochs): Next-Level generation alignment
#     - Train: Level 1..K Generator + L_consist
#     - Freeze: Encoder, Level 0
#     - Loss: L_NTP + L_consist
#
#   Phase 3 (50% epochs): Full pyramid joint finetuning
#     - Train: Full unfreeze
#     - Loss: L_NTP + L_consist + L_depth + L_CE
#
# Component-Specific Hyperparameters:
#   These control the behavior of critic.md solution implementations.
# =============================================================================

# =============================================================================
# General Training Settings
# =============================================================================
batch_size: 4                   # Per-device batch size
num_epochs: 10                  # Total training epochs

gradient:
  max_grad_norm: 1.0            # Gradient clipping (Section 7.2)
  accumulation_steps: 4         # Effective batch = 4 * 4 = 16

# =============================================================================
# Model Trainability
# =============================================================================
trainable: true
use_value_head: false           # Set true only for RL training

# =============================================================================
# Three-Phase Training Configuration
# =============================================================================
# Reference: concept-pyramid.md Section 4.3
# =============================================================================
phase_ratio:                    # Epoch distribution across phases
  phase1: 0.25                  # 25% for Level 0 intent planning
  phase2: 0.25                  # 25% for Next-Level alignment
  phase3: 0.50                  # 50% for full pyramid finetuning

# =============================================================================
# Loss Weights (Section 4.1)
# =============================================================================
# Complete loss function:
#   L_total = Σ_k L_NTP(H_k) + λ_1*L_consist + λ_2*L_depth + λ_3*L_CE
# =============================================================================
loss_weights:
  lambda_consist: 0.1           # λ_1: Cross-scale consistency (Section 4.1)
  lambda_depth: 0.05            # λ_2: Expansion rate regularization
  lambda_ce: 1.0                # λ_3: Final token alignment
  target_expansion_ratio: 4.0    # R_target: Target L_{k+1}/L_k ratio [3, 5]

# =============================================================================
# Optimizer Settings
# =============================================================================
# μP (Maximal Update Parameterization) scaling:
#   η_k = η_base * (d_k / d_base)^{-1}
# Reference: DLCM Eq.21
# =============================================================================
learning_rate: 1.0e-4           # Base learning rate η_base
weight_decay: 0.01              # Weight decay for regularization

# Learning rate schedule
lr_schedule:
  warmup_steps: 2000            # Linear warmup
  cosine_decay: true            # Cosine annealing after warmup
  min_lr_ratio: 0.1             # Minimum LR = 10% of base

# =============================================================================
# Component-Specific Hyperparameters (from concept-pyramid-critic.md)
# =============================================================================
# These settings control the behavior of solution implementations.
# Adjust based on component selection in model.yml.
# =============================================================================

# Gumbel-Softmax Expansion Predictor (Solution 1A)
gumbel_softmax:
  temperature: 0.5              # Lower = more discrete (0.1 - 1.0)
  hard: true                    # Use straight-through estimator
  anneal_temperature: true      # Anneal temperature during training
  min_temperature: 0.1          # Minimum temperature after annealing

# REINFORCE Expansion Predictor (Solution 1B)
reinforce:
  baseline_weight: 0.5          # Weight for baseline loss
  reward_baseline_decay: 0.99   # EMA decay for reward baseline
  entropy_bonus: 0.01           # Entropy regularization for exploration

# Directional Consistency Loss (Solution 2A)
directional_consistency:
  epsilon: 0.5                  # Allowed deviation in L2 norm
  use_dynamic_epsilon: false    # Adjust epsilon based on level

# Residual Consistency Loss (Solution 2B)
residual_consistency:
  delta_hidden_dim: 512         # Hidden dim for refinement network

# Mutual Information Consistency Loss (Solution 2C)
mutual_information:
  temperature: 0.07             # Temperature for InfoNCE
  num_negatives: 256            # Number of negative samples

# =============================================================================
# LoRA Configuration (Optional)
# =============================================================================
# Uncomment to use parameter-efficient fine-tuning
# =============================================================================
# lora:
#   r: 8                          # LoRA rank
#   lora_alpha: 16                # Scaling factor
#   lora_dropout: 0.1             # Dropout rate
#   target_modules:               # Modules to apply LoRA
#     - "q_proj"
#     - "k_proj"
#     - "v_proj"
#     - "o_proj"

# =============================================================================
# Logging and Checkpointing
# =============================================================================
logging:
  log_interval: 100             # Log every N steps
  eval_interval: 1000           # Evaluate every N steps
  save_interval: 5000           # Save checkpoint every N steps
  log_level: "INFO"

# =============================================================================
# Experiment Tracking
# =============================================================================
experiment:
  name: "nlcp_base"             # Experiment name
  tags:                         # Tags for organization
    - "nlcp"
    - "concept_pyramid"
    - "gumbel_expansion"        # Tag based on component selection
  notes: "NLCP base configuration with critic.md recommended components"
