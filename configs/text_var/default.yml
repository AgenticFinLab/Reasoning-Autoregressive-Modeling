# Text-VAR Default Configuration
# Multi-Scale VQVAE for Chain-of-Thought Reasoning
# Mirrors: third-part/VAR-main (structure and naming)

# ============================================================
# Data Configuration (using lmbase)
# ============================================================
data:
  data_name: math              # Dataset: math, gsm8k, math500, etc.
  data_path: ./data/math       # Cache path
  split: train

# ============================================================
# Environment Configuration
# ============================================================
environment:
  seed: 42
  device: auto                 # auto, cpu, cuda, mps
  num_workers: 4

# ============================================================
# Model Architecture (mirrors VAR-main/models/)
# ============================================================
model:
  # Token vocabulary
  vocab_size: 32000            # Tokenizer vocabulary size
  embed_dim: 768               # Input embedding dimension
  
  # Encoder/Decoder (mirrors basic_vae.py)
  # Downsample ratio = 2^(len(ch_mult)-1) = 2^3 = 8
  ch: 128                      # Base channel count
  ch_mult: [1, 2, 4, 8]        # Channel multipliers per resolution
  num_res_blocks: 2            # ResNet blocks per resolution
  dropout: 0.0
  z_channels: 32               # Latent channel dimension (Cvae)
  
  # VectorQuantizer2 (mirrors quant.py)
  # v_patch_lens: sequence lengths at each scale
  # For L=256 with downsample=8: latent_len=32
  # v_patch_lens should end with latent_len
  quantizer:
    codebook_size: 4096        # Codebook vocabulary size
    using_znorm: false
    beta: 0.25                 # Commitment loss weight
    quant_resi: 0.5            # φ residual ratio
    share_quant_resi: 4        # Partially shared φ layers
    v_patch_lens: [1, 2, 4, 8, 16, 32]  # Multi-scale sequence lengths

# ============================================================
# Training Configuration
# ============================================================
train:
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  num_epochs: 10
  warmup_steps: 500
  gradient_clip: 1.0
  max_seq_len: 256             # Input sequence length (L)

# ============================================================
# Logging Configuration
# ============================================================
logging:
  output_dir: ./outputs/text_var
  checkpoint_dir: ./checkpoints/text_var
  log_dir: ./logs/text_var
  log_interval: 100
  save_interval: 1000
  eval_interval: 500
  log_level: INFO
  use_wandb: false
  wandb_project: text-var
