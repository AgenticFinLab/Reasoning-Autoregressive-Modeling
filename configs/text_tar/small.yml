# Text-VAR Small Configuration
# Smaller model for testing and development

# ============================================================
# Data Configuration (using lmbase)
# ============================================================
data:
  data_name: gsm8k
  data_path: ./data/gsm8k
  split: train

# ============================================================
# Environment Configuration
# ============================================================
environment:
  seed: 42
  device: auto
  num_workers: 2

# ============================================================
# Model Architecture (smaller for testing)
# ============================================================
model:
  vocab_size: 10000
  embed_dim: 256
  
  # Encoder/Decoder
  ch: 64
  ch_mult: [1, 2, 4]           # Downsample ratio = 2^2 = 4
  num_res_blocks: 1
  dropout: 0.0
  z_channels: 16
  
  # VectorQuantizer2
  quantizer:
    codebook_size: 512
    using_znorm: false
    beta: 0.25
    quant_resi: 0.5
    share_quant_resi: 4
    v_patch_lens: [1, 2, 4, 8, 16, 32]  # Latent length = 32 for L=128

# ============================================================
# Training Configuration
# ============================================================
train:
  batch_size: 4
  learning_rate: 1.0e-4
  weight_decay: 0.01
  num_epochs: 5
  warmup_steps: 100
  gradient_clip: 1.0
  max_seq_len: 128

# ============================================================
# Logging Configuration
# ============================================================
logging:
  output_dir: ./outputs/text_tar_small
  checkpoint_dir: ./checkpoints/text_tar_small
  log_dir: ./logs/text_tar_small
  log_interval: 10
  save_interval: 100
  eval_interval: 50
  log_level: DEBUG
  use_wandb: false
  wandb_project: text-tar-dev
