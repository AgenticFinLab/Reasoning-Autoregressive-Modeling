# =============================================================================
# TEMPLATE: General Configuration Template (Single-File Version)
# =============================================================================
# Purpose:
#   Master configuration template for single-model learning experiments.
#   All settings are in one file for convenience.
#
# Supported Paradigms:
#   - Supervised Fine-tuning (SFT)
#   - Reinforcement Learning (PPO, GRPO, etc.)
#   - Other custom training methods
#
# Structure:
#   1. data        - Dataset configuration (name, path, split, subset)
#   2. environment - Runtime environment (seed, device)
#   3. model       - Model definition and inference settings
#   4. training    - Model training settings
#   5. log         - Logging, checkpointing, and output configuration
#   6. evaluation  - Evaluation datasets and metrics
#
# Usage:
#   Copy this template and modify for your specific experiment.
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
# Dataset settings for training. For datasets requiring subset configuration
# (e.g., HotpotQA with "distractor"/"fullwiki", STaRK with "amazon"/"mag"/"prime"),
# use the subset field below.
# =============================================================================
data:
  # Dataset identifier - must match registry key in dataset module
  # Note: This is a PLACEHOLDER - replace with your dataset name.
  # Examples: "GSM8K", "hotpotqa", "stark", "financebench"
  data_name: "YourDataset"

  # Local path for storing dataset cache and demo samples
  # Convention: "EXPERIMENT/data/{dataset_name}"
  data_path: "EXPERIMENT/data/YourDataset"

  # Dataset split to use for training
  # Common values: "train", "synthesized_all_split" (for STaRK)
  split: "train"

  # Subset configuration (optional)
  # Required for datasets with multiple configurations:
  #   - hotpotqa: "distractor" or "fullwiki"
  #   - stark: "amazon", "mag", or "prime"
  #   - aime2025: "AIME2025-I" or "AIME2025-II"
  #   - arc: "ARC-Challenge" or "ARC-Easy"
  # Leave empty or omit for datasets without subset requirements.
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
# Runtime environment settings including random seed and device.
# =============================================================================
environment:
  # Path to environment variables file (API keys, etc.)
  dotenv_path: ".env"

  # Random seed for reproducibility
  # Affects: torch, numpy, random, and any framework-level seeding
  seed: 42

  # Device mapping for model components
  # Allows different parts of the model to be placed on different devices.
  #
  # Priority system for device allocation (when device: "auto"):
  #   - Lower priority number = higher priority = gets GPU with more free memory
  #   - Example: priority: 1 gets best GPU, priority: 2 gets next best
  #
  # Supported component keys (framework-dependent):
  #   - "model":        Base model weights (single-component fallback)
  #   - "value_head":   Value function head (for RL methods)
  #   - "lora":         LoRA adapter weights
  #   - "reference":    Reference model (for DPO, GRPO, etc.)
  #   - Custom keys:    Any framework-specific component name
  #
  # Each entry can specify:
  #   - device:    Target device ("auto", "cpu", "cuda", "cuda:0", "mps")
  #   - priority:  Allocation priority when device: "auto" (lower = higher priority)
  #   - fallback:  Fallback device if primary unavailable (optional)
  device_map:
    model:
      device: "auto"
      priority: 1

# =============================================================================
# BLOCK 3: Model Configuration
# =============================================================================
# Model definition and inference settings.
# =============================================================================

# Model type - determines how the model is loaded and called
# Options: "huggingface", "api", "vllm", "none"
lm_type: "huggingface"

# Model identifier or local path
# HuggingFace: "Qwen/Qwen2.5-0.5B-Instruct", "meta-llama/Llama-3.1-8B-Instruct"
# Local path:  "/path/to/model"
lm_name: "Qwen/Qwen2.5-0.5B-Instruct"

# --- Inference Configuration ---
# Runtime settings for model loading and inference.
inference_config:
  device: "auto"           # "auto", "cpu", "cuda", "cuda:0", "mps"
  torch_dtype: "auto"      # "float32", "float16", "bfloat16", "auto"

  # Entropy computation (optional, for analysis purposes)
  # Remove this section if entropy analysis is not needed.
  entropy_config:
    topk_v: inf            # Top-k for entropy (inf = all tokens)
    topk_adaptive: false   # Adaptive top-k selection
    temperature: 0.0       # Temperature for entropy calculation

# --- Generation Configuration ---
# Parameters passed to model.generate() or equivalent API calls.
generation_config:
  max_new_tokens: 512      # Maximum tokens to generate
  temperature: 0.7         # Sampling temperature (higher = more random)
  top_p: 0.9               # Nucleus sampling threshold
  do_sample: true          # Enable sampling (false = greedy decoding)

# --- Prompt Configuration ---
# References to prompt templates. Format: "module.path:VARIABLE_NAME"
sys_message: "your.module:SYS_PROMPT"
user_message: "your.module:USER_PROMPT"

# --- Latent Reasoning Configuration (Optional) ---
# Enable for latent chain-of-thought reasoning methods.
# Uncomment and configure below only if your model/method supports it.
# latent_config:
#   latent_steps: 0          # Number of latent steps (> 0 to enable)
#   tail_truncate_n: 0       # Keep N tokens from end
#   head_truncate_n: 0       # Keep N tokens from beginning
#   truncate_mode: "target"  # Truncation strategy
#   add_think: false         # Add special think tokens

# =============================================================================
# BLOCK 4: Training Configuration
# =============================================================================
# Training hyperparameters and settings.
# =============================================================================

# Number of samples processed before gradient update
# For gradient accumulation: effective_batch_size = batch_size * accumulation_steps
batch_size: 1

# Number of passes over the entire dataset
num_epochs: 1

# --- Gradient Settings ---
gradient:
  # Maximum gradient norm for clipping (prevents exploding gradients)
  max_grad_norm: 1.0

  # Number of steps to accumulate gradients before optimizer step
  # Use this to simulate larger batch sizes with limited memory
  accumulation_steps: 1

# --- Model Trainability ---
# Whether the model's parameters are updated during training
trainable: true

# Attach value head for RL methods (PPO, GRPO, etc.)
# Set true only when using RL with a value function
use_value_head: false

# --- LoRA Configuration (Optional) ---
# Parameter-efficient fine-tuning via Low-Rank Adaptation.
# Remove this section entirely to use full fine-tuning instead.
lora:
  r: 8                    # LoRA rank (higher = more capacity)
  lora_alpha: 16          # Scaling factor (alpha/r determines effective LR)
  lora_dropout: 0.1       # Dropout rate for LoRA layers

# --- Optimizer Settings ---
learning_rate: 1.0e-5     # Learning rate for the optimizer

# --- PPO-Specific Settings (Optional) ---
# Uncomment if using PPO or other policy-gradient RL methods.
# ppo:
#   clip_ratio: 0.2       # PPO clipping parameter
#   entropy_coef: 0.0     # Entropy bonus coefficient
#   gamma: 0.99           # Discount factor
#   lam: 0.95             # GAE lambda
#   mini_batch_size: 4    # Mini-batch size for PPO updates
#   ppo_epochs: 4         # Number of PPO epochs per iteration

# --- RL Settings (Optional) ---
# Uncomment and configure only when using reinforcement learning.
# rl:
#   reward:
#     accuracy_weight: 1.0       # Weight for accuracy-based reward
#     format_weight: 0.1         # Weight for format correctness reward
#   shaping:
#     enabled: false             # Enable dense reward signals

# =============================================================================
# BLOCK 5: Log Configuration
# =============================================================================
# Logging, checkpointing, and output settings.
# =============================================================================
log:
  # Output directory for experiment results
  # Convention: "EXPERIMENT/{framework}/{experiment_name}"
  # Note: This is a PLACEHOLDER - replace with your experiment path.
  save_folder: "EXPERIMENT/YourFramework/YourExperiment"

  # Logging verbosity level
  # Options: "DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"
  log_level: "INFO"

  # =========================================================================
  # Step Intervals (all values are TRAINING STEPS)
  # =========================================================================
  # A training step is one gradient update (one batch processed).
  # These intervals control how often to log/save during training.
  # =========================================================================

  # Checkpoint save interval (in training steps)
  checkpoint_step_interval: 100

  # Metrics logging interval (in training steps)
  log_step_interval: 10

# =============================================================================
# BLOCK 6: Evaluation Configuration
# =============================================================================
# Settings for periodic evaluation during training.
# Models are already defined above - evaluation uses the same models.
# Data uses the same path as training, just different split.
# =============================================================================
evaluation:
  # Enable/disable periodic evaluation
  enabled: true

  # Evaluation interval (in training steps)
  eval_step_interval: 100

  # Dataset split for evaluation (uses same data_path as training)
  split: "test"

  # Number of samples to evaluate (null for full set)
  num_samples: null

  # Metrics to compute during evaluation
  metrics:
    - "accuracy"
