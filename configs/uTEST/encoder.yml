# =============================================================================
# Unit Test: Encoder Configuration
# =============================================================================
# Purpose:
#   Configuration template for testing encoder models.
#   Used for unit testing encoder-specific functionality.
# =============================================================================

# =============================================================================
# Model Configuration
# =============================================================================
lm_type: "huggingface"

encoder:
  lm_type: "huggingface"
  lm_name: "Qwen/Qwen2.5-0.5B"

  inference_config:
    device: "auto"
    torch_dtype: "auto"

  # Encoder-specific settings
  pretrained: true
  freeze: false
  max_length: 2048

# =============================================================================
# Latent Token Configuration
# =============================================================================
latent_token_len: 32
use_im_start_end: true

# =============================================================================
# Test Settings
# =============================================================================
test:
  batch_size: 1
  input_text: "This is a test input for encoder."
