# =============================================================================
# Unit Test: Encoder Configuration
# =============================================================================
# Purpose:
#   Configuration template for testing encoder models.
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
data:
  data_name: "math"
  data_path: "EXPERIMENT/data/math"
  split: "test"
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
environment:
  dotenv_path: ".env"
  seed: 42
  device_map:
    encoder:
      device: "auto"
      priority: 1

# =============================================================================
# BLOCK 3: Model Configuration
# =============================================================================
model:
  lm_type: &lm_type "huggingface"

  encoder:
    lm_type: *lm_type
    model_name: "Qwen/Qwen2.5-0.5B"
    inference_config:
      torch_dtype: "auto"
    pretrained: true
    freeze: false
    max_length: 128

  quantizer: null

# =============================================================================
# BLOCK 4: Training Configuration
# =============================================================================
training:
  batch_size: 2
  num_epochs: 1

  gradient:
    max_grad_norm: 1.0
    accumulation_steps: 1

  trainable: true
  use_value_head: false
  learning_rate: 1.0e-5

# =============================================================================
# BLOCK 5: Log Configuration
# =============================================================================
log:
  save_folder: "EXPERIMENT/uTEST/encoder"
  log_level: "INFO"
  checkpoint_step_interval: 100
  log_step_interval: 10

# =============================================================================
# BLOCK 6: Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
