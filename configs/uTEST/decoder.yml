# =============================================================================
# Decoder Unit Test Configuration
# =============================================================================
# Used by: examples/uTEST/test_decoder.py
# Tests: Encoder -> Decoder pipeline (no quantizer)

# =============================================================================
# Data Configuration
# =============================================================================
data:
  data_name: math
  data_path: ./EXPERIMENT/data
  split: train

# =============================================================================
# Environment Configuration
# =============================================================================
environment:
  seed: 42
  device: auto

# =============================================================================
# Model Architecture
# =============================================================================
model:
  # --- HuggingFace Encoder ---
  encoder:
    model_name: bert-base-uncased
    pretrained: true
    freeze: false
    # No projection, use BERT hidden_dim directly (768)
    output_dim: null
    # Sequence length L
    max_length: 512

  # --- HuggingFace Decoder ---
  decoder:
    model_name: gpt2
    pretrained: true
    freeze: false

  # --- Multi-Scale Quantizer ---
  quantizer: null

  # --- Latent dimension ---
  latent_dim: null

# =============================================================================
# Training Configuration
# =============================================================================
train:
  # Test only, batch_size used for inference
  batch_size: 2

# =============================================================================
# Logging Configuration
# =============================================================================
logging: null
