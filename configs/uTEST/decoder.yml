# =============================================================================
# Unit Test: Decoder Configuration
# =============================================================================
# Purpose:
#   Configuration template for testing decoder models.
#   Used for unit testing decoder-specific functionality.
# =============================================================================

# =============================================================================
# Model Configuration
# =============================================================================
lm_type: "huggingface"

decoder:
  lm_type: "huggingface"
  lm_name: "Qwen/Qwen2.5-0.5B"

  inference_config:
    device: "auto"
    torch_dtype: "auto"

  # Decoder-specific settings
  pretrained: true
  freeze: false

# =============================================================================
# Generation Configuration
# =============================================================================
generation_config:
  max_new_tokens: 128
  temperature: 0.7
  top_p: 0.9
  do_sample: true

# =============================================================================
# Test Settings
# =============================================================================
test:
  batch_size: 1
  latent_token_len: 32
