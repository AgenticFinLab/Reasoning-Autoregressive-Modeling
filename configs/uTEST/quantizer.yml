# =============================================================================
# Quantizer Unit Test Configuration
# =============================================================================
# Used by: examples/uTEST/test_quantizer.py
# Tests: Encoder -> Quantizer (multi-scale) pipeline

# =============================================================================
# Data Configuration
# =============================================================================
data:
  data_name: math
  data_path: ./EXPERIMENT/data
  split: train

# =============================================================================
# Environment Configuration
# =============================================================================
environment:
  seed: 42
  device: auto

# =============================================================================
# Model Architecture
# =============================================================================
model:
  # --- HuggingFace Encoder ---
  encoder:
    model_name: bert-base-uncased
    pretrained: true
    freeze: false
    # Project to match quantizer codebook_dim
    output_dim: 256
    # Sequence length L (tokenizer padding/truncation)
    max_length: 32

  # --- HuggingFace Decoder ---
  decoder: null

  # --- Multi-Scale Quantizer ---
  quantizer:
    codebook_size: 1024
    codebook_dim: 256
    # max(scale_lengths) should <= max_length
    scale_lengths: [1, 2, 4, 8, 16, 32]
    beta: 0.25
    quant_resi: 0.5
    share_quant_resi: 4

  # --- Latent dimension ---
  latent_dim: null

# =============================================================================
# Training Configuration
# =============================================================================
train:
  # Test only, batch_size used for inference
  batch_size: 2

# =============================================================================
# Logging Configuration
# =============================================================================
logging: null
