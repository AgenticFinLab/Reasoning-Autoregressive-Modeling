# =============================================================================
# Quantizer Unit Test Configuration
# =============================================================================
# Used by: examples/uTEST/test_quantizer.py
# Tests: Encoder -> Quantizer (multi-scale) pipeline

# =============================================================================
# Data Configuration
# =============================================================================
data:
  data_name: math
  data_path: ./data
  split: train

# =============================================================================
# Environment Configuration
# =============================================================================
environment:
  seed: 42
  device: auto
  num_workers: 4

# =============================================================================
# Model Architecture
# =============================================================================
model:
  # --- HuggingFace Encoder ---
  encoder:
    model_name: bert-base-uncased
    pretrained: true
    freeze: false
    output_dim: 256  # Project to match quantizer codebook_dim
    max_length: 32   # Short for fast testing

  # --- HuggingFace Decoder ---
  decoder: null  # Not used in quantizer test

  # --- Multi-Scale Quantizer ---
  quantizer:
    codebook_size: 1024
    codebook_dim: 256
    scale_lengths: [1, 2, 4, 8, 16, 32]
    beta: 0.25
    quant_resi: 0.5
    share_quant_resi: 4

  # --- Latent dimension ---
  latent_dim: 256

# =============================================================================
# Training Configuration
# =============================================================================
train:
  batch_size: 2
  learning_rate: 1.0e-4
  weight_decay: 0.01
  num_epochs: 10
  warmup_steps: 100
  gradient_clip: 1.0
  max_seq_len: 32

# =============================================================================
# Logging Configuration
# =============================================================================
logging: null
