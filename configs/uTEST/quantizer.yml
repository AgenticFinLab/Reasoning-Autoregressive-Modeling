# =============================================================================
# Unit Test: Quantizer Configuration
# =============================================================================
# Purpose:
#   Configuration template for testing quantizer models.
#   Used for unit testing quantizer-specific functionality.
# =============================================================================

# =============================================================================
# Quantizer Configuration
# =============================================================================
quantizer:
  type: "vqvae"

  # Codebook settings
  codebook_size: 8192
  latent_dim: 256
  num_codebooks: 1

  # VQ-VAE specific settings
  commitment_cost: 0.25
  decay: 0.99
  epsilon: 1.0e-5

  # Quantization settings
  share_codebook: true
  use_ema: true

# =============================================================================
# Encoder Configuration (for testing quantizer with encoder output)
# =============================================================================
encoder:
  lm_type: "huggingface"
  lm_name: "Qwen/Qwen2.5-0.5B"
  inference_config:
    device: "auto"
    torch_dtype: "auto"
  pretrained: true

# =============================================================================
# Test Settings
# =============================================================================
test:
  batch_size: 1
  latent_token_len: 32
  input_dim: 896  # Qwen2.5-0.5B hidden dim
