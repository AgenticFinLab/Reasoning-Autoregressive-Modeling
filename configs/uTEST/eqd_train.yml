# =============================================================================
# Encoder-Quantizer-Decoder Training Configuration
# =============================================================================
# Used by: examples/uTEST/test_eqd_train.py
# Task: VQ-AE text reconstruction with multi-scale quantization
# Pipeline: texts -> Encoder -> [B, L, D] -> Quantizer -> [B, L, D] -> Decoder -> [B, L, V]

# =============================================================================
# Data Configuration
# =============================================================================
data:
  data_name: math
  data_path: ./EXPERIMENT/data
  split: train

# =============================================================================
# Environment Configuration
# =============================================================================
environment:
  seed: 42
  device: auto

# =============================================================================
# Model Architecture
# =============================================================================
model:
  # --- HuggingFace Encoder ---
  encoder:
    # BERT-base: bidirectional encoder, hidden_dim=768
    model_name: bert-base-uncased
    # Load pretrained weights for better initialization
    pretrained: true
    # Train encoder (unfrozen)
    freeze: false
    # Project to match quantizer codebook_dim (256)
    output_dim: 256
    # Sequence length L (must be >= max(scale_lengths))
    max_length: 64

  # --- HuggingFace Decoder ---
  decoder:
    # GPT2: causal decoder, hidden_dim=768, vocab_size=50257
    model_name: gpt2
    # Load pretrained weights for better initialization
    pretrained: true
    # Train decoder (unfrozen)
    freeze: false

  # --- Multi-Scale Quantizer ---
  quantizer:
    # Codebook vocabulary size V
    codebook_size: 1024
    # Must match encoder output_dim
    codebook_dim: 256
    # Multi-scale lengths (max should <= max_length)
    scale_lengths: [1, 2, 4, 8, 16, 32, 64]
    # Commitment loss weight β
    beta: 0.25
    # Phi residual ratio
    quant_resi: 0.5
    # Number of scales sharing phi layer
    share_quant_resi: 4

  # --- Latent dimension ---
  latent_dim: 256

# =============================================================================
# Training Configuration
# =============================================================================
train:
  # Small batch for testing
  batch_size: 4
  # Conservative learning rate for fine-tuning pretrained models
  learning_rate: 1.0e-4
  # L2 regularization
  weight_decay: 0.01
  # Number of training epochs
  num_epochs: 3
  # Warmup steps for learning rate scheduler
  warmup_steps: 100
  # Gradient clipping threshold
  gradient_clip: 1.0

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  output_dir: ./EXPERIMENT/uTEST-eqd_train
  checkpoint_dir: ./EXPERIMENT/uTEST-eqd_train/checkpoints
  log_dir: ./EXPERIMENT/uTEST-eqd_train/logs
  # Log every N steps
  log_interval: 10
  save_interval: null
  eval_interval: null
  log_level: INFO
  use_wandb: false
  wandb_project: null
