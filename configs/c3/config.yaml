# =============================================================================
# C3 Context Cascade Compression - Training Configuration
# =============================================================================
# Paper: "Context Cascade Compression: Exploring the Upper Limits of Text Compression"
#         (arXiv:2511.15244)
#
# Usage:
#   # Basic training (single/multi-GPU with pipeline parallel)
#   python examples/c3/train_c3.py -c configs/c3/config.yaml
#
#   # DeepSpeed training (multi-GPU with ZeRO-2)
#   torchrun --nproc_per_node=4 examples/c3/train_c3_ds.py \
#       --config configs/c3/config.yaml \
#       --deepspeed configs/c3/zero2.json
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
data:
  data_name: "math"
  data_path: "EXPERIMENT/data/math"
  split: "train"
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
environment:
  seed: 42
  dataloader_num_workers: 8
  # Device map for pipeline parallel training (train_c3.py)
  # Automatically assigns encoder and decoder to different GPUs
  # For DeepSpeed training (train_c3_ds.py), this is ignored
  device_map:
    encoder:
      device: auto
      priority: 2  # Lower priority = assigned to GPU with less free memory
    decoder:
      device: auto
      priority: 1  # Higher priority = assigned to GPU with more free memory

# =============================================================================
# BLOCK 3: Model Configuration
# =============================================================================
model:
  lm_type: &lm_type "huggingface"

  encoder:
    lm_type: *lm_type
    model_name: "Qwen/Qwen2.5-0.5B"
    inference_config:
      torch_dtype: "auto"
    pretrained: &pretrained true
    freeze: &freeze false
    latent_token_len: &latent_token_len 32
    max_length: &max_length 2048
    use_im_start_end: true

  decoder:
    lm_type: *lm_type
    model_name: "Qwen/Qwen2.5-1.5B"
    inference_config:
      torch_dtype: "auto"
    pretrained: *pretrained
    freeze: *freeze
    latent_token_len: *latent_token_len

  quantizer: null

# =============================================================================
# BLOCK 4: Training Configuration
# =============================================================================
# NOTE: For DeepSpeed training (train_c3_ds.py), the following are in zero2.json:
#   - bf16 (mixed precision)
#   - gradient_accumulation_steps
#   - gradient_clipping
#   - train_micro_batch_size_per_gpu
# =============================================================================
training:
  num_epochs: 5

  # Basic training settings (train_c3.py)
  batch_size: 8
  bf16: true
  gradient:
    accumulation_steps: 16
    max_grad_norm: 1.0
    checkpointing: true

  trainable: true
  use_value_head: false

  learning_rate: 1.0e-5
  weight_decay: 0.0
  warmup_ratio: 0.01
  lr_scheduler_type: "cosine"
  resume: true

  loss:
    type: "dual_tokenizer_reconstruction"
    ignore_index: -100
    label_smoothing: 0.0
    latent_token_len: *latent_token_len

# =============================================================================
# BLOCK 5: Log Configuration
# =============================================================================
log:
  save_folder: "EXPERIMENT/c3"
  log_level: "INFO"
  checkpoint_step_interval: 5000
  log_step_interval: 10
  # Block size for ReconstructionSampleStore (samples per block)
  block_size: 50

# =============================================================================
# BLOCK 6: Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
