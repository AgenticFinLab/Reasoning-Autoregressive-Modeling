# =============================================================================
# Encoder-Quantizer-Decoder Multi-Scale Configuration
# =============================================================================
# Purpose:
#   Configuration for encoder-quantizer-decoder model with multi-scale
#   quantization structure (similar to VAR-style multi-scale tokens).
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
data:
  data_name: "YourDataset"
  data_path: "EXPERIMENT/data/YourDataset"
  split: "train"
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
environment:
  dotenv_path: ".env"
  seed: 42
  device_map:
    encoder:
      device: "auto"
      priority: 3
    quantizer:
      device: "auto"
      priority: 2
    decoder:
      device: "auto"
      priority: 1

# =============================================================================
# BLOCK 3: Model Configuration
# =============================================================================
model:
  lm_type: &lm_type "huggingface"
  latent_dim: 256

  encoder:
    lm_type: *lm_type
    model_name: "YourEncoderModel"
    inference_config:
      torch_dtype: "auto"
    pretrained: &pretrained true
    freeze: &freeze false

  quantizer:
    type: "multi_scale"
    num_scales: 4
    codebook_size: 8192
    latent_dim: 256
    commitment_cost: 0.25
    scales:
      - scale: 1
        tokens_per_scale: 1
      - scale: 2
        tokens_per_scale: 4
      - scale: 3
        tokens_per_scale: 16
      - scale: 4
        tokens_per_scale: 64

  decoder:
    lm_type: *lm_type
    model_name: "YourDecoderModel"
    inference_config:
      torch_dtype: "auto"
    pretrained: *pretrained
    freeze: *freeze

# =============================================================================
# BLOCK 4: Training Configuration
# =============================================================================
training:
  batch_size: 1
  num_epochs: 1

  gradient:
    max_grad_norm: 1.0
    accumulation_steps: 1
    checkpointing: true

  trainable: true
  use_value_head: false

  learning_rate: 1.0e-5
  weight_decay: 0.0
  warmup_steps: 100
  vq_loss_weight: 1.0
  lr_scheduler_type: "cosine"
  bf16: true
  resume: true

# =============================================================================
# BLOCK 5: Log Configuration
# =============================================================================
log:
  save_folder: "EXPERIMENT/PreExp/eqd_scales"
  log_level: "INFO"
  checkpoint_step_interval: 100
  log_step_interval: 10

# =============================================================================
# BLOCK 6: Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
