# =============================================================================
# Encoder-Quantizer-Decoder Multi-Scale Configuration
# =============================================================================
# Purpose:
#   Configuration for encoder-quantizer-decoder model with multi-scale
#   quantization structure (similar to VAR-style multi-scale tokens).
#
# Structure:
#   1. data        - Dataset configuration
#   2. environment - Runtime environment settings
#   3. encoder     - Encoder model definition
#   4. quantizer   - Quantizer configuration (multi-scale)
#   5. decoder     - Decoder model definition
#   6. training    - Training settings
#   7. log         - Logging and checkpointing
#   8. evaluation  - Evaluation settings
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
data:
  data_name: "YourDataset"
  data_path: "EXPERIMENT/data/YourDataset"
  split: "train"
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
environment:
  dotenv_path: ".env"
  seed: 42
  device_map:
    encoder:
      device: "auto"
      priority: 3
    quantizer:
      device: "auto"
      priority: 2
    decoder:
      device: "auto"
      priority: 1
  dataloader_num_workers: 8
  tf32: true

# =============================================================================
# BLOCK 3: Model Configuration - Encoder
# =============================================================================
lm_type: "huggingface"

encoder:
  lm_type: "huggingface"
  lm_name: "YourEncoderModel"
  inference_config:
    device: "auto"
    torch_dtype: "auto"
  pretrained: true
  freeze: false

# =============================================================================
# BLOCK 4: Model Configuration - Quantizer
# =============================================================================
# Multi-scale quantizer configuration (VAR-style).
# =============================================================================
quantizer:
  type: "multi_scale"
  num_scales: 4
  codebook_size: 8192
  latent_dim: 256
  commitment_cost: 0.25

  # Multi-scale specific settings
  scales:
    - scale: 1
      tokens_per_scale: 1
    - scale: 2
      tokens_per_scale: 4
    - scale: 3
      tokens_per_scale: 16
    - scale: 4
      tokens_per_scale: 64

# =============================================================================
# BLOCK 5: Model Configuration - Decoder
# =============================================================================
decoder:
  lm_type: "huggingface"
  lm_name: "YourDecoderModel"
  inference_config:
    device: "auto"
    torch_dtype: "auto"
  pretrained: true
  freeze: false

# =============================================================================
# BLOCK 6: Training Configuration
# =============================================================================
batch_size: 1
num_epochs: 1

gradient:
  max_grad_norm: 1.0
  accumulation_steps: 1
  checkpointing: true

trainable: true
use_value_head: false

learning_rate: 1.0e-5
weight_decay: 0.0
warmup_ratio: 0.01
lr_scheduler_type: "cosine"

bf16: true
resume: true

# =============================================================================
# BLOCK 7: Log Configuration
# =============================================================================
log:
  save_folder: "EXPERIMENT/PreExp/eqd_scales"
  log_level: "INFO"
  checkpoint_step_interval: 100
  log_step_interval: 10
  save_total_limit: 1

# =============================================================================
# BLOCK 8: Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  eval_step_interval: null
  datasets: null
  metrics: null
