# =============================================================================
# Encoder-Decoder Original Configuration
# =============================================================================
# Purpose:
#   Configuration for basic encoder-decoder model experiments.
#   Template for standard encoder-decoder architectures without quantization.
#
# Structure:
#   1. data        - Dataset configuration
#   2. environment - Runtime environment settings
#   3. encoder     - Encoder model definition
#   4. decoder     - Decoder model definition
#   5. training    - Training settings
#   6. log         - Logging and checkpointing
#   7. evaluation  - Evaluation settings
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
data:
  data_name: "YourDataset"
  data_path: "EXPERIMENT/data/YourDataset"
  split: "train"
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
environment:
  dotenv_path: ".env"
  seed: 42
  device_map:
    encoder:
      device: "auto"
      priority: 2
    decoder:
      device: "auto"
      priority: 1
  dataloader_num_workers: 8
  tf32: true

# =============================================================================
# BLOCK 3: Model Configuration - Encoder
# =============================================================================
lm_type: "huggingface"

encoder:
  lm_type: "huggingface"
  lm_name: "YourEncoderModel"
  inference_config:
    device: "auto"
    torch_dtype: "auto"
  pretrained: true
  freeze: false

# =============================================================================
# BLOCK 4: Model Configuration - Decoder
# =============================================================================
decoder:
  lm_type: "huggingface"
  lm_name: "YourDecoderModel"
  inference_config:
    device: "auto"
    torch_dtype: "auto"
  pretrained: true
  freeze: false

# =============================================================================
# BLOCK 5: Training Configuration
# =============================================================================
batch_size: 1
num_epochs: 1

gradient:
  max_grad_norm: 1.0
  accumulation_steps: 1
  checkpointing: true

trainable: true
use_value_head: false

learning_rate: 1.0e-5
weight_decay: 0.0
warmup_ratio: 0.01
lr_scheduler_type: "cosine"

bf16: true
resume: true

# =============================================================================
# BLOCK 6: Log Configuration
# =============================================================================
log:
  save_folder: "EXPERIMENT/PreExp/ed_original"
  log_level: "INFO"
  checkpoint_step_interval: 100
  log_step_interval: 10
  save_total_limit: 1

# =============================================================================
# BLOCK 7: Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  eval_step_interval: null
  datasets: null
  metrics: null
