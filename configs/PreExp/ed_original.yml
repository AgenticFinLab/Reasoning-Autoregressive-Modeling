# =============================================================================
# Encoder-Decoder Original Configuration
# =============================================================================
# Purpose:
#   Configuration for basic encoder-decoder model experiments.
#   Template for standard encoder-decoder architectures without quantization.
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
data:
  data_name: "YourDataset"
  data_path: "EXPERIMENT/data/YourDataset"
  split: "train"
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
environment:
  dotenv_path: ".env"
  seed: 42
  dataloader_num_workers: 4
  device_map:
    encoder:
      device: "auto"
      priority: 2
    decoder:
      device: "auto"
      priority: 1

# =============================================================================
# BLOCK 3: Model Configuration
# =============================================================================
model:
  lm_type: &lm_type "huggingface"

  encoder:
    lm_type: *lm_type
    model_name: "YourEncoderModel"
    inference_config:
      torch_dtype: "auto"
    pretrained: &pretrained true
    freeze: &freeze false

  decoder:
    lm_type: *lm_type
    model_name: "YourDecoderModel"
    inference_config:
      torch_dtype: "auto"
    pretrained: *pretrained
    freeze: *freeze

  quantizer: null

# =============================================================================
# BLOCK 4: Training Configuration
# =============================================================================
training:
  batch_size: 1
  num_epochs: 1

  gradient:
    max_grad_norm: 1.0
    accumulation_steps: 1
    checkpointing: true

  trainable: true
  use_value_head: false

  learning_rate: 1.0e-5
  weight_decay: 0.0
  warmup_steps: 100
  lr_scheduler_type: "cosine"
  bf16: true
  resume: true

# =============================================================================
# BLOCK 5: Log Configuration
# =============================================================================
log:
  save_folder: "EXPERIMENT/PreExp/ed_original"
  log_level: "INFO"
  checkpoint_step_interval: 100
  log_step_interval: 10

# =============================================================================
# BLOCK 6: Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
