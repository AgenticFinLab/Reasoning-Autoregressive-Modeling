# =============================================================================
# Encoder-Quantizer-Decoder with Hierarchical Text Structure Configuration
# =============================================================================
# Purpose: Test text-native hierarchical quantization (True TAR)
# Approach: Linguistically motivated scales: sentence → clause → phrase → word → subword
# Pipeline: Text → Encoder → z → HierarchicalQuantizer → f_hat → Decoder → logits

# =============================================================================
# Data Configuration
# =============================================================================
data:
  data_name: math
  data_path: ./EXPERIMENT/data
  split: train

# =============================================================================
# Environment Configuration
# =============================================================================
environment:
  seed: 42
  device: auto

# =============================================================================
# Model Architecture
# =============================================================================
model:
  # --- Encoder ---
  encoder:
    model_name: bert-base-uncased
    pretrained: true
    freeze: false
    output_dim: 256
    max_length: 256  # Shorter for hierarchical structure

  # --- Latent Dimension ---
  latent_dim: 256

  # --- Quantizer (HIERARCHICAL TEXT) ---
  # Text-native hierarchy:
  # Scale 0: [1]   → sentence embedding (topic)
  # Scale 1: [4]   → clause embeddings (structure)
  # Scale 2: [16]  → phrase embeddings (phrasing)
  # Scale 3: [64]  → word embeddings (words)
  # Scale 4: [256] → subword embeddings (tokens)
  # Total: 341 codes
  quantizer:
    type: hierarchical
    codebook_size: 4096
    scale_lengths: [1, 4, 16, 64, 256]  # 341 total codes
    beta: 0.25
    quant_resi: 0.5

  # --- Decoder ---
  decoder:
    model_name: gpt2
    pretrained: true
    freeze: false

# =============================================================================
# Training Configuration
# =============================================================================
train:
  batch_size: 4
  learning_rate: 1.0e-4
  weight_decay: 0.01
  num_epochs: 20
  warmup_steps: 200
  gradient_clip: 1.0
  vq_loss_weight: 1.0
  resume: true

  # --- Loss Configuration ---
  loss:
    type: dual_tokenizer_vqae
    ignore_index: -100
    label_smoothing: 0.0

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  output_dir: ./EXPERIMENT/PreExp-eqd_hierarchical
  checkpoint_dir: ./EXPERIMENT/PreExp-eqd_hierarchical/checkpoints
  log_dir: ./EXPERIMENT/PreExp-eqd_hierarchical/logs
  
  log_interval: 50
  checkpoint_interval: 500
  
  eval_interval: null
  log_level: INFO
  use_wandb: false
  wandb_project: null
