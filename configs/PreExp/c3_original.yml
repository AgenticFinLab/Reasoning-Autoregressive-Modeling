# =============================================================================
# C3 Context Cascade Compression Configuration
# =============================================================================
# Purpose:
#   Configuration for training C3 (Context Cascade Compression) model.
#   C3 uses separate encoder and decoder LLMs with latent token compression.
#
# Paper: "Context Cascade Compression: Exploring the Upper Limits of Text Compression"
#         (arXiv:2511.15244)
# Official Code: third-part/C3-Context-Cascade-Compression-main/C3-master/C3/model/C3.py
#
# Pipeline:
#   text + <img> + <imgpad>*N + </img>
#       -> Encoder LLM -> hidden_states
#       -> Extract [img_pos+1 : img_pos+N+1] -> latent_tokens [B, N, D]
#       -> mm_projector -> projected_latent [B, N, D_decoder]
#       -> Decoder LLM -> logits [B, L, V]
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
data:
  data_name: "math"
  data_path: "EXPERIMENT/data/math"
  split: "train"
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
environment:
  dotenv_path: ".env"
  seed: 42
  device_map:
    encoder:
      device: "auto"
      priority: 2
    decoder:
      device: "auto"
      priority: 1

# =============================================================================
# BLOCK 3: Model Configuration
# =============================================================================
# C3 uses encoder-decoder architecture with latent token compression.
# Official: encoder Qwen2.5-1.5B, decoder Qwen2.5-3B
# =============================================================================
model:
  lm_type: &lm_type "huggingface"
  
  encoder:
    lm_type: *lm_type
    lm_name: "Qwen/Qwen2.5-0.5B"
    inference_config:
      torch_dtype: "auto"
    pretrained: &pretrained true
    freeze: &freeze false
    latent_token_len: &latent_token_len 32
    max_length: 2048
    use_im_start_end: true

  decoder:
    lm_type: *lm_type
    lm_name: "Qwen/Qwen2.5-1.5B"
    inference_config:
      torch_dtype: "auto"
    pretrained: *pretrained
    freeze: *freeze
    latent_token_len: *latent_token_len

  quantizer: null

# =============================================================================
# BLOCK 4: Training Configuration
# =============================================================================
training:
  batch_size: 2
  num_epochs: 15

  gradient:
    max_grad_norm: 1.0
    accumulation_steps: 16
    checkpointing: true

  trainable: true
  use_value_head: false

  learning_rate: 1.0e-5
  weight_decay: 0.0
  warmup_ratio: 0.01
  lr_scheduler_type: "cosine"
  bf16: true
  resume: true

  loss:
    type: "dual_tokenizer_reconstruction"
    ignore_index: -100
    label_smoothing: 0.0
    latent_token_len: *latent_token_len

# =============================================================================
# BLOCK 5: Log Configuration
# =============================================================================
log:
  save_folder: "EXPERIMENT/PreExp/c3_original"
  log_level: "INFO"
  checkpoint_step_interval: 5000
  log_step_interval: 10

# =============================================================================
# BLOCK 6: Evaluation Configuration
# =============================================================================
# C3 official: no evaluation during training.
evaluation:
  enabled: false
