# =============================================================================
# ED (Encoder-Decoder) - Training Configuration
# =============================================================================
# Purpose:
#   Configuration for basic encoder-decoder model training.
#   Template for standard encoder-decoder architectures without quantization.
# =============================================================================

# =============================================================================
# BLOCK 1: Data Configuration
# =============================================================================
data:
  data_name: "math"
  data_path: "EXPERIMENT/data/math"
  split: "train"
  subset: ""

# =============================================================================
# BLOCK 2: Environment Configuration
# =============================================================================
environment:
  seed: 42
  dataloader_num_workers: 8
  # Device map for pipeline parallel training (train_ed.py)
  # For DeepSpeed training (train_ed_ds.py), this is ignored
  device_map:
    encoder:
      device: auto
      priority: 2
    decoder:
      device: auto
      priority: 1

# =============================================================================
# BLOCK 3: Model Configuration
# =============================================================================
model:
  lm_type: &lm_type "huggingface"

  encoder:
    lm_type: *lm_type
    model_name: "bert-base-uncased"
    inference_config:
      torch_dtype: "auto"
    pretrained: &pretrained true
    freeze: &freeze false
    max_length: &max_length 512

  decoder:
    lm_type: *lm_type
    model_name: "gpt2"
    inference_config:
      torch_dtype: "auto"
    pretrained: *pretrained
    freeze: *freeze
    max_length: *max_length

  quantizer:
    codebook_size: 4096
    codebook_dim: 256
    scale_lengths: [1, 4, 16, 64, 256]
    beta: 0.25
    quant_resi: 0.5

# =============================================================================
# BLOCK 4: Training Configuration
# =============================================================================
# NOTE: For DeepSpeed training (train_ed_ds.py), the following are in zero2.json:
#   - bf16 (mixed precision)
#   - gradient_accumulation_steps
#   - gradient_clipping
#   - train_micro_batch_size_per_gpu
# =============================================================================
training:
  num_epochs: 5

  # Basic training settings (train_ed.py)
  batch_size: 8
  bf16: true
  gradient:
    accumulation_steps: 16
    max_grad_norm: 1.0
    checkpointing: true

  trainable: true
  use_value_head: false

  learning_rate: 1.0e-5
  weight_decay: 0.0
  warmup_steps: 100
  lr_scheduler_type: "cosine"
  resume: true

# =============================================================================
# BLOCK 5: Log Configuration
# =============================================================================
log:
  save_folder: "EXPERIMENT/eqd_hierarchical"
  log_level: "INFO"
  checkpoint_step_interval: 5000
  log_step_interval: 10

# =============================================================================
# BLOCK 6: Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
